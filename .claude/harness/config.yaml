# 工程开发模式配置文件
# 版本: 1.0.0

# 项目基本信息
project:
  name: MSCustomAi
  version: 1.0.0
  description: 项目描述
  language: swift、object-c  # python, java, javascript, go, etc.
  
  # 阶段配置
  stages:
    # 设计阶段
    - stage: code-design
      config:
        auto: false   # 需要人工审核后确认
        next: code-coding
    
    # 编码阶段
    - stage: code-coding
      config:
        auto: true
        next: code-consistency-check
    
    # 一致性验证阶段
    - stage: code-consistency-check
      config:
        # 综合检测得分
        threshold: 85
        on_pass:
          next: code-quality
        on_fail:
          next: code-coding
          message: "一致性验证未通过（< 85%），请修复后重新提交"
    
    # 质量阶段
    - stage: code-quality
      config:
        # 综合检测得分
        threshold: 85
        on_pass:
          next: my-git-skill
        on_fail:
          next: null
          message: "质量检查未通过（< 85分），请修复后重新检查"
    
    # 提交阶段
    - stage: my-git-skill
      config:
        auto: true
        next: null
        message: "代码已提交"