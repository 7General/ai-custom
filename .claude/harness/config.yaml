# Harness工程开发模式配置文件
# 版本: 1.0.0

# 项目基本信息
project:
  name: 项目名称
  version: 1.0.0
  description: 项目描述
  language: swift、object-c  # python, java, javascript, go, etc.
  
# 开发流程配置
workflow:
  # 流程模式
  mode: standard  # standard, agile, waterfall
  
  # 自动流转
  auto_proceed: true
  
  # 质量门禁
  quality_gate: true
  
  # 代码评审
  require_review: true
  
  # 最少评审人数
  min_reviewers: 2

# 阶段配置
stages:
  # 设计阶段
  design:
    enabled: true
    auto_proceed_to_coding: false
    
    # 设计文档模板
    templates:
      - architecture.md
      - api-design.md
      - data-model.md
      
    # 设计评审
    review_required: true
    reviewers:
      - tech-lead
      - architect
  
  # 编码阶段
  coding:
    enabled: true
    
    # 编码规范
    standards: clean-code
    
    # 代码评审
    review_required: true
    
    # TDD模式
    tdd_enabled: true
    
    # 自动格式化
    auto_format: true
    
    # 提交前检查
    pre_commit_hooks:
      - lint
      - test
      - coverage
  
  # 测试阶段
  testing:
    enabled: true
    
    # 测试类型
    test_types:
      - unit
      - integration
      - e2e
      - performance
    
    # 覆盖率阈值
    coverage_threshold: 80
    
    # 并行执行
    parallel: true
    
    # 失败重试次数
    retry_count: 2
  
  # 质量阶段
  quality:
    enabled: true
    
    # 质量检查工具
    tools:
      - sonarqube
      - checkstyle
      - security-scan
      - dependency-check
    
    # 复杂度限制
    complexity_limit: 10
    
    # 重复代码率
    duplication_limit: 5
  
  # 部署阶段
  deploy:
    enabled: true
    
    # 部署环境
    environments:
      - name: dev
        auto_deploy: true
        strategy: rolling
        replicas: 2
        
      - name: test
        auto_deploy: false
        strategy: rolling
        replicas: 2
        
      - name: staging
        auto_deploy: false
        require_approval: true
        strategy: rolling
        replicas: 3
        
      - name: prod
        auto_deploy: false
        require_approval: true
        strategy: canary
        replicas: 10

  # 提交阶段
  gitPush:
    enabled: true
    

# 质量标准
quality:
  # 代码覆盖率
  code_coverage: 80
  
  # 测试通过率
  test_pass_rate: 95
  
  # 代码复杂度
  complexity_limit: 10
  
  # 重复代码率
  duplication_limit: 5
  
  # 安全漏洞
  security_issues:
    critical: 0
    high: 0
    medium: 2
    low: 5

# 质量门禁规则
quality_gates:
  - name: 代码覆盖率
    metric: code_coverage
    threshold: 80
    operator: ">="
    
  - name: 测试通过率
    metric: test_pass_rate
    threshold: 95
    operator: ">="
    
  - name: 高危漏洞数
    metric: high_severity_issues
    threshold: 0
    operator: "=="
    
  - name: 代码复杂度
    metric: cyclomatic_complexity
    threshold: 10
    operator: "<="
    
  - name: 重复代码率
    metric: code_duplication
    threshold: 5
    operator: "<="

# 通知配置
notifications:
  # 邮件通知
  email:
    enabled: true
    recipients:
      - team@example.com
    events:
      - stage_completed
      - quality_gate_failed
      - deployment_completed
  
  # Slack通知
  slack:
    enabled: true
    webhook_url: ${SLACK_WEBHOOK_URL}
    channel: "#dev-team"
    events:
      - deployment_completed
      - production_issue
  
  # 企业微信通知
  wechat:
    enabled: true
    webhook_url: ${WECHAT_WEBHOOK_URL}
    events:
      - deployment_completed
      - production_issue

# 报告配置
reports:
  # 报告存储路径
  output_dir: reports
  
  # 报告保留天数
  retention_days: 30
  
  # 报告格式
  formats:
    - html
    - json
    - pdf

# 集成配置
integrations:
  # Git集成
  git:
    provider: github  # github, gitlab, bitbucket
    repository: owner/repo
    
  # CI/CD集成
  cicd:
    provider: harness  # harness, jenkins, gitlab-ci
    pipelines:
      build: build_pipeline
      deploy: deploy_pipeline
      test: test_pipeline
  
  # 代码质量平台
  quality_platform:
    provider: sonarqube
    url: https://sonar.example.com
    project_key: my-project
    
  # 监控平台
  monitoring:
    provider: prometheus
    url: https://prometheus.example.com
    grafana_url: https://grafana.example.com